server:
  port: 21000

spring:
  application:
    name: claudeflow-console

  datasource:
    url: jdbc:sqlite:${user.home}/.claudeflow/console.db
    driver-class-name: org.sqlite.JDBC

  jpa:
    database-platform: org.sqlite.hibernate.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

# SSE配置
sse:
  heartbeat-interval: 30000

# 数据清理配置
cleanup:
  enabled: true
  retention-days: 7
  schedule: "0 0 3 * * ?"

# CORS配置（前端分离开发）
cors:
  allowed-origins: "http://localhost:5173,http://localhost:3000,http://192.168.100.181:5173"