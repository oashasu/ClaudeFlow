id: T104
phase_id: phase-1
title: 打通治理任务包到 runtime dispatch 的适配链
executor_type: claude
reviewer_type: governor
priority: critical
inputs:
  - ../spec.md
  - ../architecture.md
  - ../acceptance.md
constraints:
  - 必须从 .super-dev 任务包进入运行对象
  - executor_type/write_paths/acceptance_refs 必须进入结构化调度对象
allowed_write_paths:
  - src/claudeflow/governance/**
  - src/claudeflow/runtime/**
  - tests/**
acceptance_refs:
  - A05
outputs:
  - changed_files
  - test_evidence
  - summary
forbidden_actions:
  - 要求 Governor 手工维护平行 task graph
  - 仅通过日志传递 executor_type
done_definition:
  - governance_runtime_adapter_added
  - dispatch_input_chain_connected
  - review_ready
rework_policy:
  max_rounds: 3
  inherit_previous_findings: true
gate_on_complete: review_required
