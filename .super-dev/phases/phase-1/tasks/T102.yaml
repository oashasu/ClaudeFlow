id: T102
phase_id: phase-1
title: 将现有 Claude CLI 路径收敛为 ClaudeDriver 并接入 registry
executor_type: claude
reviewer_type: governor
priority: high
inputs:
  - ../spec.md
  - ../architecture.md
  - ../acceptance.md
constraints:
  - 保持现有 Claude 路径兼容
  - 不得破坏已有 runtime API/CLI 基础行为
allowed_write_paths:
  - src/claudeflow/runtime/**
  - tests/**
acceptance_refs:
  - A01
  - A02
outputs:
  - changed_files
  - test_evidence
  - summary
forbidden_actions:
  - 删除现有可用的 Claude 会话管理能力
  - 绕过 registry 直接从 RuntimeManager 调 CliDriver
done_definition:
  - claude_driver_registered
  - claude_dispatch_path_green
  - review_ready
rework_policy:
  max_rounds: 3
  inherit_previous_findings: true
gate_on_complete: review_required
